name: Update Space Shooter Game

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate game
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install gh-space-shooter
          gh-space-shooter jernejk \
            --output game.gif \
            --strategy random \
            --fps 25 \
            --max-frame 200

      - name: Commit game update
        run: |
          if git diff --quiet -- game.gif; then
            echo "game.gif is already current"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add game.gif

          commit_message="Update space shooter game GIF"
          last_message="$(git log -1 --pretty=%s 2>/dev/null || true)"
          last_files="$(git log -1 --name-only --pretty=format: 2>/dev/null | grep -v '^$' || true)"

          if [ "$last_message" = "$commit_message" ] && [ "$last_files" = "game.gif" ]; then
            git commit --amend --no-edit
            git push --force-with-lease
          else
            git commit -m "$commit_message"
            git push
          fi
